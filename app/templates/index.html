{% extends "base.html" %}

{% block title %}Pokemendel Journey{% endblock %}

{% block content %}
<h1>Welcome to Pokemendel Journey</h1>
<p>Select a game to get started:</p>
<div class="game-cards">
    {% for game_id, game in games.items() %}
    <a href="/game/{{ game_id }}/" class="game-card">
        <h2>{{ game.display_name }}</h2>
        <p>Generation {{ game.generation }}</p>
    </a>
    {% endfor %}
</div>
{% endblock %}
